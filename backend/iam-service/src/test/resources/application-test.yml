spring:
  datasource:
    url: jdbc:h2:mem:iamtest;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: false
        # H2 doesn't support `engine=InnoDB` clauses; the dialect omits them.
  cloud:
    discovery:
      enabled: false
  main:
    allow-bean-definition-overriding: true

eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false

jwt:
  secret: test-secret-do-not-use-in-production-32+chars-padding-padding
  access-token-expiration-ms: 900000
  refresh-token-expiration-ms: 604800000

logging:
  level:
    root: WARN
    com.payroute: WARN
