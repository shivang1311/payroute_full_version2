sonar.projectKey=payroute-hub-frontend
sonar.projectName=PayRoute Hub — Frontend
sonar.projectVersion=1.0.0

# SonarQube server
sonar.host.url=http://localhost:9000

# Sources
sonar.sources=src
sonar.exclusions=src/**/__tests__/**,src/**/*.test.ts,src/**/*.test.tsx,src/test/**,node_modules/**,dist/**

# Test files
sonar.tests=src
sonar.test.inclusions=src/**/__tests__/**,src/**/*.test.ts,src/**/*.test.tsx,src/test/**

# TypeScript
sonar.typescript.tsconfigPath=tsconfig.app.json

# Coverage — generated by: npm run test:coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Encoding
sonar.sourceEncoding=UTF-8
